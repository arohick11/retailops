# Logstash Pipeline Configuration
# Suitable for academic/demo RetailOps project evaluation.
#
# ELK FLOW OVERVIEW:
# [Filebeat (Shipper)] -> [Logstash (Parser/Filter)] -> [Elasticsearch (Indexer)] -> [Grafana/Kibana]
# This Logstash configuration listens on port 5044 for events sent by Filebeat DaemonSets.
# It processes Node.js backend & React/Nginx frontend logs, enriches them with fields,
# and indexes them cleanly into Elasticsearch.

input {
  # Accept connections from Filebeat shippers via the Beats protocol
  beats {
    port => 5044
    codec => json_lines
    tags => ["kubernetes_logs"]
  }
}

filter {
  # 1. Standardize Kubernetes metadata fields
  if [kubernetes] {
    mutate {
      add_field => {
        "pod_name"       => "%{[kubernetes][pod][name]}"
        "container_name" => "%{[kubernetes][container][name]}"
        "namespace"      => "%{[kubernetes][namespace]}"
      }
    }
  }

  # 2. Parse backend-service logs (Node.js/Express application)
  # Assuming backend logs are formatted in JSON (e.g., winston or pino format)
  if [container_name] == "backend-service" or [kubernetes][container][name] == "backend" {
    # Check if the log message itself is JSON
    if [message] =~ /^\{.*/ {
      json {
        source => "message"
        target => "app_log"
      }
      # Elevate parsed JSON properties to root fields for easy indexing
      mutate {
        add_field => {
          "log_level"   => "%{[app_log][level]}"
          "api_route"   => "%{[app_log][route]}"
          "latency_ms"  => "%{[app_log][duration]}"
          "status_code" => "%{[app_log][status]}"
        }
        remove_field => [ "message", "app_log" ]
      }
      # Convert data types for proper Elasticsearch mapping
      mutate {
        convert => {
          "status_code" => "integer"
          "latency_ms"  => "float"
        }
      }
    } else {
      # Fallback: Parse non-json error stack traces or startup messages
      grok {
        match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:log_message}" }
      }
    }
  }

  # 3. Parse frontend-service logs (Nginx Web Server)
  # Standard Nginx Access Log format parsing
  if [container_name] == "frontend-service" or [kubernetes][container][name] == "frontend" {
    grok {
      match => { "message" => "%{IPORHOST:client_ip} - %{USER:remote_user} \[%{HTTPDATE:nginx_timestamp}\] \"%{WORD:http_method} %{URIPATHPARAM:request_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:status_code:int} %{NUMBER:body_bytes_sent:int} \"%{DATA:referrer}\" \"%{DATA:user_agent}\"" }
      add_tag => [ "nginx_access" ]
    }
    date {
      match => [ "nginx_timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
      remove_field => "nginx_timestamp"
    }
  }
}

output {
  # 1. Output to Elasticsearch for indexing and search
  elasticsearch {
    hosts => ["http://elasticsearch-service.logging.svc.cluster.local:9200"]
    index => "retailops-%{namespace}-%{+YYYY.MM.dd}"
    # In academic/demo setups, credentials may be set as env vars or omitted
    # user => "${ELASTICSEARCH_USER}"
    # password => "${ELASTICSEARCH_PASSWORD}"
  }

  # 2. Output to stdout in rubydebug format (useful for testing/debugging pipeline errors)
  stdout {
    codec => rubydebug
  }
}
