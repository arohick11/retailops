# HashiCorp Vault Server Deployment (Dev Mode)
# Namespace: vault

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-server
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
      - name: vault
        image: hashicorp/vault:1.15.2
        command: ["vault", "server", "-dev", "-dev-listen-address=0.0.0.0:8200", "-dev-root-token-id=root-token"]
        env:
        - name: VAULT_ADDR
          value: "http://127.0.0.1:8200"
        ports:
        - name: api
          containerPort: 8200
        - name: cluster
          containerPort: 8201
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 10
          periodSeconds: 10
